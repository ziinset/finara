<!-- Top Navigation Bar -->
<header class="sticky top-0 z-50 bg-background/80 backdrop-blur-md px-container-padding-mobile py-4 flex items-center justify-between">
<button aria-label="Kembali" class="w-10 h-10 flex items-center justify-center rounded-full hover:bg-surface-container-low transition-colors">
<span class="material-symbols-outlined text-primary">arrow_back</span>
</button>
<h1 class="font-headline-lg-mobile text-headline-lg-mobile text-primary">Edit Profil</h1>
<div class="w-10"></div> <!-- Spacer for centering -->
</header>
<main class="px-container-padding-mobile pb-32 max-w-2xl mx-auto">
<!-- Profile Photo Section -->
<section class="flex flex-col items-center py-stack-lg">
<div class="relative group">
<div class="w-32 h-32 rounded-full border-4 border-white soft-shadow overflow-hidden">
<img class="w-full h-full object-cover" data-alt="A professional studio portrait of a woman named Goldi Arasseo with warm lighting, against a soft cream background. The style is high-end lifestyle photography, matching the Terra Finance premium aesthetic. She has a friendly expression, perfectly centered, with crisp focus and natural skin tones." src="https://lh3.googleusercontent.com/aida-public/AB6AXuBa8Fm4xqAmr7eNdDE0AoM0WhtbwtfX17Ic83j3fpGFIxKSdfSVkHMoE9uA22ILSoHfmsoosIPVi6Jzkmoa3M7Q3FXP3Da1OApq6nnvBB9UI90-FbrEYS0EOhqJ7mBywehTp-mTKesQzf_zIvLZO7CG9Az4sOTP_rTrKGwEDhRmodFewbzdaM7K_EZFoKvcJ-YTPH4M2U37uezp1Deb2Xll5LVjhG_TxaFpijSRB71OFz3Gu3V7ysJo7iwyoYF9E7FKr9m8_0vHLEo"/>
</div>
<button aria-label="Ubah Foto" class="absolute bottom-0 right-0 bg-secondary-fixed text-on-secondary-fixed w-10 h-10 rounded-full flex items-center justify-center soft-shadow active:scale-90 transition-transform border-2 border-white">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">photo_camera</span>
</button>
</div>
<p class="mt-stack-md font-title-md text-title-md text-primary">Goldi Arasseo</p>
</section>
<!-- Information Profil 7.2 -->
<section class="bg-white rounded-3xl p-6 soft-shadow mb-stack-lg">
<div class="flex items-center gap-2 mb-6">
<span class="material-symbols-outlined text-primary">person_outline</span>
<h2 class="font-label-caps text-label-caps text-primary tracking-widest uppercase">Informasi Profil</h2>
</div>
<form class="space-y-5">
<div class="space-y-2">
<label class="block font-label-caps text-label-caps text-on-surface-variant">Nama Lengkap</label>
<input class="w-full h-14 px-4 bg-surface rounded-xl border-outline-variant premium-input font-body-lg focus:ring-0" type="text" value="Goldi Arasseo"/>
</div>
<div class="space-y-2">
<label class="block font-label-caps text-label-caps text-on-surface-variant">Nama Pengguna</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant">@</span>
<input class="w-full h-14 pl-10 pr-4 bg-surface rounded-xl border-outline-variant premium-input font-body-lg focus:ring-0" type="text" value="goldiarasseo"/>
</div>
</div>
<div class="space-y-2">
<label class="block font-label-caps text-label-caps text-on-surface-variant">Alamat Email</label>
<input class="w-full h-14 px-4 bg-surface rounded-xl border-outline-variant premium-input font-body-lg focus:ring-0" type="email" value="goldi.arasseo@terra.com"/>
</div>
<div class="space-y-2">
<label class="block font-label-caps text-label-caps text-on-surface-variant">Nomor Telepon (Opsional)</label>
<input class="w-full h-14 px-4 bg-surface rounded-xl border-outline-variant premium-input font-body-lg focus:ring-0" placeholder="+62 812 3456 7890" type="tel"/>
</div>
<div class="space-y-2">
<label class="block font-label-caps text-label-caps text-on-surface-variant">Tanggal Bergabung</label>
<div class="w-full h-14 px-4 bg-surface-container-low rounded-xl border border-outline-variant/30 flex items-center text-on-surface-variant font-body-lg opacity-80">
                        12 Oktober 2023
                    </div>
</div>

</section>
<!-- Security Section 7.3 -->

<button class="w-full bg-primary text-on-primary h-14 rounded-2xl font-title-md text-title-md soft-shadow hover:bg-primary-container transition-all active:scale-[0.98]">
            Simpan Perubahan
        </button>

<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-gutter py-2 bg-surface dark:bg-surface-dim border-t border-surface-variant dark:border-outline-variant shadow-lg rounded-t-xl">

</button>

<span class="material-symbols-outlined">account_balance_wallet</span>
<span class="font-label-caps text-label-caps">Anggaran</span>
</button>
<!-- Profil (ACTIVE) -->
<button class="flex flex-col items-center justify-center bg-primary-container dark:bg-primary text-on-primary-container dark:text-on-primary rounded-full px-4 py-1 active:scale-95 transition-all duration-200">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">person</span>
<span class="font-label-caps text-label-caps">Profil</span>
</button>

<script>
        // Micro-interactions
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.classList.add('scale-[1.01]');
            });
            input.addEventListener('blur', () => {
                input.parentElement.classList.remove('scale-[1.01]');
            });
        });
    </script>
